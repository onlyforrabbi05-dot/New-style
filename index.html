<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Channel Live Feed</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f2f5;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #0088cc;
            margin-bottom: 5px;
            font-size: 24px;
        }
        p.subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
            text-align: center;
        }
        #feed-container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        /* টেলিগ্রাম পোস্টের চারপাশের সুন্দর ফ্রেম */
        iframe {
            border: none !important;
            box-shadow: 0 4px 10px rgba(0,0,0,0.06);
            border-radius: 12px;
            background: white;
            width: 100% !important;
        }
    </style>
</head>
<body>

    <h1>📢 Telegram Channel Live Feed</h1>
    <p class="subtitle">চ্যানেলে পাঠানো সব টেক্সট, ফটো ও ভিডিও এখানে নিচে লোড হবে</p>

    <div id="feed-container">
        
        <!-- অফিশিয়াল টেলিগ্রাম প্রিভিউ উইজেট -->
        <script async src="https://telegram.org/js/telegram-widget.js?22" 
                data-telegram-post="YOUR_CHANNEL_USERNAMErabbi/preview" 
                data-width="100%">
        </script>

    </div>

</body>
</html>
